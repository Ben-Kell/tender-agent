<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Tender Response Agent</title>
<style>
/* (styles unchanged for brevity) */
</style>
</head>
<body>
<div class="shell">

<!-- UI trimmed: removed template input entirely -->

<input type="hidden" id="template-name" value="response_template.md" />

<!-- Rest of UI unchanged -->

<script>
function getTenderId() {
    return document.getElementById("tender-id").value.trim();
}

function getTemplateName() {
    return "response_template.md"; // hardcoded
}

function isAllowedFile(filename) {
    const name = filename.toLowerCase();
    return name.endsWith(".docx") || name.endsWith(".pdf") || name.endsWith(".csv");
}

async function refreshOutputs() {
    const tenderId = getTenderId();

    if (!tenderId) {
        alert("Enter a Tender ID.");
        return;
    }

    showLoadingFiles();

    try {
        const response = await fetch(`/list_outputs/${encodeURIComponent(tenderId)}`);

        if (!response.ok) {
            const errorText = await response.text();
            renderEmptyFiles("Unable to load output files", errorText);
            return;
        }

        const data = await response.json();

        if (!data.files || data.files.length === 0) {
            renderEmptyFiles("No output files found", `No generated artefacts are available yet for tender ${tenderId}.`);
            return;
        }

        // FILTER FILES HERE
        const filteredFiles = data.files.filter(isAllowedFile);

        if (filteredFiles.length === 0) {
            renderEmptyFiles("No visible output files", "Only .docx, .pdf, and .csv files are shown.");
            return;
        }

        const listItems = filteredFiles.map(filename => {
            const href = `/download_output/${encodeURIComponent(tenderId)}/${encodeURIComponent(filename)}`;
            return `
                <li class="file-item">
                    <div class="file-meta">
                        <div class="file-icon">📄</div>
                        <div>
                            <a class="file-name" href="${href}" target="_blank">${filename}</a>
                            <div class="file-subtext">Generated artefact</div>
                        </div>
                    </div>
                    <a class="download-link" href="${href}" target="_blank">Open File</a>
                </li>
            `;
        }).join("");

        document.getElementById("output-files").innerHTML = `<ul class="file-list">${listItems}</ul>`;

    } catch (error) {
        renderEmptyFiles("Unexpected error", error.message || "An error occurred while loading outputs.");
    }
}
</script>
</body>
</html>
